<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGTS - Tests</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; padding-bottom: 50px; }
        header { background-color: #2ecc71; color: white; padding: 15px; text-align: center; position: relative; }
        .container { max-width: 800px; margin: 30px auto; padding: 20px; }
        .back-btn { position: absolute; left: 15px; top: 15px; background: #2c3e50; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; text-decoration: none; font-weight: bold;}
        .test-card { background: white; padding: 15px; border-radius: 6px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #2ecc71;}
        .start-btn { background: #2ecc71; color: white; text-decoration: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; font-size: 14px;}
        .admin-section { display: none; background: #fff; padding: 20px; border-radius: 8px; margin-top: 40px; border: 2px dashed #e74c3c; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .del-btn { background: #e74c3c; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; margin-left: 10px;}
    </style>
</head>
<body>
    <header>
        <button id="dynamic-back" class="back-btn">⬅ Back</button>
        <h1 id="sub-title-display">Tests List</h1>
    </header>

    <div class="container">
        <h2 style="color:#2c3e50; margin-bottom: 15px;">उपलब्ध मॉक टेस्ट्स 📝</h2>
        <div id="test-list"></div>

        <div class="admin-section" id="admin-panel">
            <h3 style="color:#e74c3c; margin-bottom:15px;">👑 एडमिन टेस्ट मैनेजमेंट</h3>
            <div class="form-group">
                <input type="text" id="test-name" placeholder="उदा. Mock Test 1">
                <button class="btn" style="background:#e74c3c; margin-top:10px;" onclick="addTest()">नया टेस्ट जोड़ें</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('courseId');
        const subId = urlParams.get('subId');
        const isAdmin = localStorage.getItem("role") === "admin";
        if(isAdmin) document.getElementById("admin-panel").style.display = "block";

        document.getElementById("dynamic-back").onclick = function() { window.location.href = `subjects.html?courseId=${courseId}`; };

        let globalData = JSON.parse(localStorage.getItem("cgts_data"));
        let currentCourse = globalData.find(c => c.id === courseId);
        let currentSub = currentCourse.subjects.find(s => s.id === subId);
        document.getElementById("sub-title-display").innerText = currentSub.name;

        function renderTests() {
            const list = document.getElementById("test-list");
            list.innerHTML = "";
            currentSub.tests.forEach((test, index) => {
                list.innerHTML += `
                    <div class="test-card">
                        <span><strong>Test ${index + 1}:</strong> ${test.name}</span>
                        <div>
                            <a href="quiz.html" class="start-btn">Start Test</a>
                            ${isAdmin ? `<button class="del-btn" onclick="deleteTest('${test.id}')">Delete</button>` : ''}
                        </div>
                    </div>`;
            });
            if(currentSub.tests.length === 0) list.innerHTML = `<p style="color:#999;">इस विषय में अभी कोई टेस्ट नहीं है।</p>`;
        }

        function addTest() {
            const name = document.getElementById("test-name").value.trim();
            if(!name) return;
            currentSub.tests.push({ id: "test_" + Date.now(), name: name });
            localStorage.setItem("cgts_data", JSON.stringify(globalData));
            renderTests();
        }

        function deleteTest(testId) {
            if(confirm("टेस्ट डिलीट करें?")) {
                currentSub.tests = currentSub.tests.filter(t => t.id !== testId);
                localStorage.setItem("cgts_data", JSON.stringify(globalData));
                renderTests();
            }
        }
        renderTests();
    </script>
</body>
</html>
