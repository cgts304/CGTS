<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGTS - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .login-card h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: #666; font-weight: 600; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .login-btn { background-color: #3498db; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error-msg { color: #e74c3c; text-align: center; margin-top: 10px; display: none; }
        .reg-link { text-align: center; margin-top: 15px; font-size: 14px; }
        .reg-link a { color: #2ecc71; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>CGTS Login</h2>
        <form id="login-form">
            <div class="input-group">
                <label>यूज़रनेम / मोबाइल नंबर</label>
                <input type="text" id="username" placeholder="Username या Mobile" required>
            </div>
            <div class="input-group">
                <label>पासवर्ड</label>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="button" class="login-btn" onclick="checkLogin()">लॉगिन करें</button>
            <p class="error-msg" id="error-text">गलत डिटेल्स!</p>
        </form>
        <div class="reg-link">
            नया अकाउंट बनाना है? <a href="register.html">यहाँ रजिस्टर करें</a>
        </div>
    </div>

    <script>
        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorText = document.getElementById('error-text');

            // 1. एडमिन लॉगिन (Direct Entry)
            if (user === "admin" && pass === "12345") {
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("role", "admin");
                localStorage.setItem("currentUser", "Admin");
                window.location.href = "index.html";
                return;
            }

            // 2. स्टूडेंट लॉगिन चेक
            const savedUser = localStorage.getItem("user_" + user);

            if (savedUser) {
                const userData = JSON.parse(savedUser);
                
                if (userData.password === pass) {
                    // यहाँ चेक होगा कि एडमिन ने अप्रूव किया है या नहीं
                    if (userData.status === "approved") {
                        localStorage.setItem("isLoggedIn", "true");
                        localStorage.setItem("role", "student");
                        localStorage.setItem("currentUser", userData.name);
                        window.location.href = "index.html";
                    } else {
                        errorText.style.display = 'block';
                        errorText.innerText = "आपका अकाउंट अभी एडमिन द्वारा वेरीफाई नहीं किया गया है। कृपया प्रतीक्षा करें!";
                    }
                } else {
                    errorText.style.display = 'block';
                    errorText.innerText = "गलत पासवर्ड!";
                }
            } else {
                errorText.style.display = 'block';
                errorText.innerText = "यह यूज़रनेम रजिस्टर्ड नहीं है!";
            }
        }
    </script>
</body>
</html>
