<script>
    function checkLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // 1. पहले चेक करें कि क्या यह मुख्य एडमिन है
        if (user === "admin" && pass === "12345") {
            localStorage.setItem("isLoggedIn", "true");
            localStorage.setItem("currentUser", "Admin");
            window.location.href = "index.html";
            return;
        }

        // 2. अगर एडमिन नहीं है, तो चेक करें कि क्या इस नाम का कोई स्टूडेंट रजिस्टर्ड है
        const savedUser = localStorage.getItem(user);

        if (savedUser) {
            const userData = JSON.parse(savedUser);
            // पासवर्ड मैच करें
            if (userData.password === pass) {
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("currentUser", userData.name); // स्टूडेंट का नाम सेव करें
                window.location.href = "index.html";
            } else {
                document.getElementById('error-text').style.display = 'block';
                document.getElementById('error-text').innerText = "गलत पासवर्ड!";
            }
        } else {
            document.getElementById('error-text').style.display = 'block';
            document.getElementById('error-text').innerText = "यह यूज़रनेम रजिस्टर्ड नहीं है!";
        }
    }
</script>
