    <script>
        function checkLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorText = document.getElementById('error-text');

            // एरर टेक्स्ट को शुरू में छुपा दें
            errorText.style.display = 'none';

            if (user === "" || pass === "") {
                errorText.style.display = 'block';
                errorText.innerText = "कृपया सभी डिटेल्स भरें!";
                return;
            }

            // 1. एडमिन लॉगिन चेक
            if (user === "admin" && pass === "12345") {
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("role", "admin");
                localStorage.setItem("currentUser", "Admin");
                window.location.href = "index.html";
                return;
            }

            // 2. मोबाइल नंबर से स्टूडेंट लॉगिन चेक
            // हमने register.html में "user_" + mobile नंबर के नाम से डेटा सेव किया था
            const savedUser = localStorage.getItem("user_" + user);

            if (savedUser) {
                const userData = JSON.parse(savedUser);
                
                // पासवर्ड की जांच करें
                if (userData.password === pass) {
                    
                    // स्टेटस की जांच करें (चाहे वह userData.status में हो या सीधे सेव हुआ हो)
                    if (userData.status === "approved" || userData.status === "active") {
                        localStorage.setItem("isLoggedIn", "true");
                        localStorage.setItem("role", "student");
                        localStorage.setItem("currentUser", userData.name);
                        window.location.href = "index.html";
                    } else if (userData.status === "blocked") {
                        errorText.style.display = 'block';
                        errorText.innerText = "आपका अकाउंट एडमिन द्वारा ब्लॉक कर दिया गया है!";
                    } else {
                        errorText.style.display = 'block';
                        errorText.innerText = "आपका अकाउंट अभी एडमिन द्वारा वेरीफाई (Activate) नहीं किया गया है।";
                    }

                } else {
                    errorText.style.display = 'block';
                    errorText.innerText = "गलत पासवर्ड! कृपया दोबारा जांचें।";
                }
            } else {
                errorText.style.display = 'block';
                errorText.innerText = "यह मोबाइल नंबर रजिस्टर्ड नहीं है!";
            }
        }
    </script>
