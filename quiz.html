<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGTS - GK Mock Test 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #f4f7f6;
            padding: 20px;
        }

        .quiz-container {
            max-width: 700px;
            margin: 20px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .quiz-header h2 {
            color: #2c3e50;
            font-size: 20px;
        }

        .timer {
            background: #e74c3c;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .question-block {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px dashed #ddd;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .options-list {
            list-style: none;
        }

        .option-item {
            margin-bottom: 10px;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }

        .option-item:hover {
            background: #e3f2fd;
            border-color: #3498db;
        }

        .option-item input {
            margin-right: 12px;
            transform: scale(1.2);
            cursor: pointer;
        }

        .submit-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background-color: #27ae60;
        }

        /* Result Section Styling */
        .result-box {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .result-box h2 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .score {
            font-size: 40px;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 20px;
        }

        .home-btn {
            display: inline-block;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="quiz-container" id="quiz-box">
        <div class="quiz-header">
            <h2>General Knowledge - Test 1</h2>
            <div class="timer" id="time-display">10:00</div>
        </div>

        <!-- टेस्ट फॉर्म -->
        <form id="quiz-form">
            
            <!-- प्रश्न 1 -->
            <div class="question-block">
                <p class="question-text">Q1. भारत की राजधानी क्या है?</p>
                <ul class="options-list">
                    <li class="option-item"><label><input type="radio" name="q1" value="A"> A) मुंबई</label></li>
                    <li class="option-item"><label><input type="radio" name="q1" value="B"> B) नई दिल्ली</label></li>
                    <li class="option-item"><label><input type="radio" name="q1" value="C"> C) कोलकाता</label></li>
                    <li class="option-item"><label><input type="radio" name="q1" value="D"> D) चेन्नई</label></li>
                </ul>
            </div>

            <!-- प्रश्न 2 -->
            <div class="question-block">
                <p class="question-text">Q2. भारत का राष्ट्रीय पशु कौन सा है?</p>
                <ul class="options-list">
                    <li class="option-item"><label><input type="radio" name="q2" value="A"> A) शेर</label></li>
                    <li class="option-item"><label><input type="radio" name="q2" value="B"> B) हाथी</label></li>
                    <li class="option-item"><label><input type="radio" name="q2" value="C"> C) बाघ (Tiger)</label></li>
                    <li class="option-item"><label><input type="radio" name="q2" value="D"> D) चीता</label></li>
                </ul>
            </div>

            <!-- प्रश्न 3 -->
            <div class="question-block">
                <p class="question-text">Q3. विश्व का सबसे बड़ा महाद्वीप कौन सा है?</p>
                <ul class="options-list">
                    <li class="option-item"><label><input type="radio" name="q3" value="A"> A) एशिया</label></li>
                    <li class="option-item"><label><input type="radio" name="q3" value="B"> B) अफ़्रीका</label></li>
                    <li class="option-item"><label><input type="radio" name="q3" value="C"> C) यूरोप</label></li>
                    <li class="option-item"><label><input type="radio" name="q3" value="D"> D) ऑस्ट्रेलिया</label></li>
                </ul>
            </div>

            <button type="button" class="submit-btn" onclick="calculateScore()">Submit Test</button>
        </form>
    </div>

    <!-- रिज़ल्ट बॉक्स (शुरुआत में छुपा रहेगा) -->
    <div class="quiz-container result-box" id="result-box">
        <h2>आपका टेस्ट पूरा हो गया है!</h2>
        <p>आपका फाइनल स्कोर है:</p>
        <div class="score" id="final-score">0 / 3</div>
        <a href="index.html" class="home-btn">मुख्य पेज पर जाएं</a>
    </div>

    <!-- JavaScript लॉजिक -->
    <script>
        // सही उत्तरों की की (Answer Key)
        const correctAnswers = {
            q1: "B",
            q2: "C",
            q3: "A"
        };

        // 10 मिनट का टाइमर शुरू करना
        let totalTime = 10 * 60; 
        const timerElement = document.getElementById('time-display');

        const countdown = setInterval(() => {
            let minutes = Math.floor(totalTime / 60);
            let seconds = totalTime % 60;

            seconds = seconds < 10 ? '0' + seconds : seconds;
            minutes = minutes < 10 ? '0' + minutes : minutes;

            timerElement.innerHTML = `${minutes}:${seconds}`;

            if (totalTime <= 0) {
                clearInterval(countdown);
                alert("समय समाप्त हो गया है! आपका टेस्ट ऑटोमैटिक सबमिट हो रहा है।");
                calculateScore();
            }
            totalTime--;
        }, 1000);

        // स्कोर कैलकुलेट करने का फंक्शन
        function calculateScore() {
            clearInterval(countdown); // टाइमर रोकें
            
            let score = 0;
            const form = document.getElementById('quiz-form');
            const formData = new FormData(form);

            // उत्तरों की जांच
            for (let key in correctAnswers) {
                if (formData.get(key) === correctAnswers[key]) {
                    score++;
                }
            }

            // रिज़ल्ट दिखाना
            document.getElementById('quiz-box').style.display = 'none';
            document.getElementById('result-box').style.display = 'block';
            document.getElementById('final-score').innerHTML = `${score} / ${Object.keys(correctAnswers).length}`;
        }
    </script>
</body>
</html>
