<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGTS - Registration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .register-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .register-card h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: #666; font-weight: 600; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .register-btn { background-color: #2ecc71; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .login-link { text-align: center; margin-top: 15px; font-size: 14px; }
        .login-link a { color: #3498db; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="register-card">
        <h2>CGTS Registration</h2>
        <form id="register-form">
            <div class="input-group">
                <label>पूरा नाम</label>
                <input type="text" id="reg-name" placeholder="आपका नाम" required>
            </div>
            <div class="input-group">
                <label>यूज़रनेम / मोबाइल नंबर</label>
                <input type="text" id="reg-username" placeholder="Username चुनें" required>
            </div>
            <div class="input-group">
                <label>पासवर्ड</label>
                <input type="password" id="reg-password" placeholder="Password बनाएं" required>
            </div>
            <button type="button" class="register-btn" onclick="saveRegistration()">रजिस्टर करें</button>
        </form>
        <div class="login-link">
            पहले से अकाउंट है? <a href="login.html">लॉगिन करें</a>
        </div>
    </div>

    <script>
        function saveRegistration() {
            const name = document.getElementById('reg-name').value;
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;

            if(name === "" || username === "" || password === "") {
                alert("कृपया सभी डिटेल्स भरें!");
                return;
            }

            if(localStorage.getItem("user_" + username)) {
                alert("यह यूज़रनेम पहले से मौजूद है!");
                return;
            }

            const studentData = {
                name: name,
                username: username,
                password: password,
                status: "pending" // शुरुआत में स्टेटस पेंडिंग रहेगा
            };

            localStorage.setItem("user_" + username, JSON.stringify(studentData));
            
            alert("रजिस्ट्रेशन सफल! एडमिन द्वारा वेरीफाई होने के बाद आप लॉगिन कर पाएंगे।");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
