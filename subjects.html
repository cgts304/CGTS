<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGTS - Subjects</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; padding-bottom: 50px; }
        header { background-color: #3498db; color: white; padding: 15px; text-align: center; position: relative; }
        .container { max-width: 800px; margin: 30px auto; padding: 20px; }
        .back-btn { position: absolute; left: 15px; top: 15px; background: #2c3e50; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; text-decoration: none; font-weight: bold;}
        .subject-card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #2c3e50;}
        .admin-section { display: none; background: #fff; padding: 20px; border-radius: 8px; margin-top: 40px; border: 2px dashed #e74c3c; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .del-btn { background: #e74c3c; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="back-btn">⬅ Back</a>
        <h1 id="course-title-display">Subjects</h1>
    </header>

    <div class="container">
        <h2 style="color:#2c3e50;">विषय चुनें 📚</h2>
        <div id="subject-list" style="margin-top:20px;"></div>

        <div class="admin-section" id="admin-panel">
            <h3 style="color:#e74c3c; margin-bottom:15px;">👑 एडमिन विषय मैनेजमेंट</h3>
            <div class="form-group">
                <input type="text" id="sub-name" placeholder="उदा. Mathematics">
                <button class="btn" style="background:#2ecc71; margin-top:10px;" onclick="addSubject()">नया विषय जोड़ें</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('courseId');
        const isAdmin = localStorage.getItem("role") === "admin";
        if(isAdmin) document.getElementById("admin-panel").style.display = "block";

        let globalData = JSON.parse(localStorage.getItem("cgts_data"));
        let currentCourse = globalData.find(c => c.id === courseId);
        document.getElementById("course-title-display").innerText = currentCourse.name;

        function renderSubjects() {
            const list = document.getElementById("subject-list");
            list.innerHTML = "";
            currentCourse.subjects.forEach(sub => {
                list.innerHTML += `
                    <div class="subject-card" onclick="window.location.href='tests.html?courseId=${courseId}&subId=${sub.id}'">
                        <strong>${sub.name}</strong>
                        ${isAdmin ? `<button class="del-btn" onclick="event.stopPropagation(); deleteSubject('${sub.id}')">Delete</button>` : '➜'}
                    </div>`;
            });
        }

        function addSubject() {
            const name = document.getElementById("sub-name").value.trim();
            if(!name) return;
            currentCourse.subjects.push({ id: "sub_" + Date.now(), name: name, tests: [] });
            localStorage.setItem("cgts_data", JSON.stringify(globalData));
            renderSubjects();
        }

        function deleteSubject(subId) {
            if(confirm("विषय डिलीट करें?")) {
                currentCourse.subjects = currentCourse.subjects.filter(s => s.id !== subId);
                localStorage.setItem("cgts_data", JSON.stringify(globalData));
                renderSubjects();
            }
        }
        renderSubjects();
    </script>
</body>
</html>
