<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGTS - Online Test Series</title>
    <style>
        /* Basic Reset and Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
        }

        /* Header Navigation */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 24px;
            letter-spacing: 1px;
        }

        /* Main Container */
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 30px;
        }

        .welcome-text h2 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        /* Test Cards Grid */
        .test-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media(min-width: 600px) {
            .test-list {
                grid-template-columns: 1fr 1fr;
            }
        }

        .test-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 5px solid #3498db;
            transition: transform 0.2s;
        }

        .test-card:hover {
            transform: translateY(-5px);
        }

        .test-card h3 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .test-card p {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }

        /* Start Button */
        .btn-start {
            display: inline-block;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.2s;
            text-align: center;
            width: 100%;
        }

        .btn-start:hover {
            background-color: #2980b9;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            color: #777;
            font-size: 14px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>CGTS Test Series</h1>
    </header>

    <div class="container">
        <div class="welcome-text">
            <h2>अपनी तैयारी की जाँच करें</h2>
            <p>नीचे दिए गए टेस्ट में से किसी एक को चुनें और शुरू करें।</p>
        </div>

        <div class="test-list">
            
            <div class="test-card">
                <h3>General Knowledge - Mock Test 1</h3>
                <p>कुल प्रश्न: 10 | समय: 10 मिनट</p>
                <a href="quiz.html" class="btn-start">Start Test</a>
            </div>

            <div class="test-card">
                <h3>Mathematics - Practice Test</h3>
                <p>कुल प्रश्न: 15 | समय: 15 मिनट</p>
                <a href="#" class="btn-start" onclick="alert('यह टेस्ट जल्द ही आ रहा है!')">Coming Soon</a>
            </div>

        </div>
    </div>

    <footer>
        <p>&copy; 2026 CGTS. All Rights Reserved.</p>
    </footer>

</body>
</html>
