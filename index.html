<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGTS - Courses</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; color: #333; padding-bottom: 50px; }
        header { background-color: #2c3e50; color: white; padding: 15px; text-align: center; position: relative;}
        .container { max-width: 800px; margin: 30px auto; padding: 20px; }
        
        .course-card { 
            background: white; padding: 20px; border-radius: 8px; margin-bottom: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 6px solid #3498db; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .course-title { font-size: 18px; font-weight: bold; color: #2c3e50; }
        .admin-section { display: none; background: #fff; padding: 20px; border-radius: 8px; margin-top: 40px; border: 2px dashed #e74c3c; }
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .del-btn { background: #e74c3c; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    </style>
    <script>
        if (localStorage.getItem("isLoggedIn") !== "true") { window.location.href = "login.html"; }
    </script>
</head>
<body>
    <header>
        <h1>CGTS Courses</h1>
        <button onclick="localStorage.clear(); window.location.href='login.html';" style="position:absolute; right:15px; top:15px; background:#e74c3c; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Logout</button>
    </header>

    <div class="container">
        <h2>उपलब्ध कोर्सेज 📋</h2>
        <div id="course-list" style="margin-top:20px;"></div>

        <div class="admin-section" id="admin-panel">
            <h3 style="color:#e74c3c; margin-bottom:15px;">👑 एडमिन कोर्स मैनेजमेंट</h3>
            <div class="form-group">
                <input type="text" id="course-name" placeholder="उदा. Assistant Teacher Recruitment">
                <button class="btn" style="background:#3498db; margin-top:10px;" onclick="addCourse()">नया कोर्स जोड़ें</button>
            </div>
        </div>
    </div>

    <script>
        const isAdmin = localStorage.getItem("role") === "admin";
        if(isAdmin) document.getElementById("admin-panel").style.display = "block";

        if(!localStorage.getItem("cgts_data")) {
            localStorage.setItem("cgts_data", JSON.stringify([{ id: "c1", name: "Assistant Teacher Recruitment", subjects: [] }]));
        }
        let globalData = JSON.parse(localStorage.getItem("cgts_data"));

        function renderCourses() {
            const list = document.getElementById("course-list");
            list.innerHTML = "";
            globalData.forEach(course => {
                list.innerHTML += `
                    <div class="course-card" onclick="window.location.href='subjects.html?courseId=${course.id}'">
                        <span class="course-title">${course.name}</span>
                        ${isAdmin ? `<button class="del-btn" onclick="event.stopPropagation(); deleteCourse('${course.id}')">Delete</button>` : '➜'}
                    </div>`;
            });
        }

        function addCourse() {
            const name = document.getElementById("course-name").value.trim();
            if(!name) return;
            globalData.push({ id: "c_" + Date.now(), name: name, subjects: [] });
            localStorage.setItem("cgts_data", JSON.stringify(globalData));
            renderCourses();
        }

        function deleteCourse(id) {
            if(confirm("क्या आप इस कोर्स को डिलीट करना चाहते हैं?")) {
                globalData = globalData.filter(c => c.id !== id);
                localStorage.setItem("cgts_data", JSON.stringify(globalData));
                renderCourses();
            }
        }
        renderCourses();
    </script>
</body>
</html>
