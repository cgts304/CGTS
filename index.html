<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGTS - Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; color: #333; }
        header { background-color: #2c3e50; color: white; padding: 15px; text-align: center; position: relative;}
        .container { max-width: 800px; margin: 30px auto; padding: 20px; }
        .test-card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #3498db; }
        .btn { display: inline-block; background: #3498db; color: white; padding: 8px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; width: 100%; text-align: center; }
        
        /* 👑 एडमिन पैनल स्टाइलिंग */
        #admin-panel { display: none; background: white; padding: 20px; border-radius: 8px; margin-top: 30px; border: 2px solid #e74c3c; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; font-size: 14px; }
        th { background-color: #2c3e50; color: white; }
        
        /* बटन कलर्स */
        .approve-btn { background: #2ecc71; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-right: 5px; }
        .approve-btn:hover { background: #27ae60; }
        .reject-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .reject-btn:hover { background: #c0392b; }
    </style>
    <script>
        if (localStorage.getItem("isLoggedIn") !== "true") {
            window.location.href = "login.html";
        }
    </script>
</head>
<body>

    <header>
        <h1>CGTS Test Series</h1>
        <button onclick="logout()" style="position:absolute; right:15px; top:15px; background:#e74c3c; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; font-weight:bold;">Logout</button>
    </header>

    <div class="container">
        <h2>नमस्ते, <span id="user-display"></span></h2>
        
        <div style="margin-top:20px;">
            <div class="test-card">
                <h3>General Knowledge - Mock Test 1</h3>
                <p>कुल प्रश्न: 3 | समय: 10 मिनट</p>
                <a href="quiz.html" class="btn">Start Test</a>
            </div>
        </div>

        <div id="admin-panel">
            <h3 style="color:#e74c3c; margin-bottom: 5px;">👑 एड民 अथॉरिटी पैनल</h3>
            <p style="font-size: 14px; color: #666;">यहाँ से नए स्टूडेंट्स का मोबाइल नंबर वेरीफाई करें या रिजेक्ट करें:</p>
            <table>
                <thead>
                    <tr>
                        <th>नाम</th>
                        <th>मोबाइल नंबर</th>
                        <th>स्टेटस</th>
                        <th>अथॉरिटी एक्शन</th>
                    </tr>
                </thead>
                <tbody id="student-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        document.getElementById("user-display").innerText = localStorage.getItem("currentUser");

        // अगर एडमिन लॉगिन है तभी पैनल दिखेगा
        if(localStorage.getItem("role") === "admin") {
            document.getElementById("admin-panel").style.display = "block";
            loadStudents();
        }

        function loadStudents() {
            const tbody = document.getElementById("student-table-body");
            tbody.innerHTML = "";
            let hasRecords = false;

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith("user_")) {
                    hasRecords = true;
                    const userData = JSON.parse(localStorage.getItem(key));
                    
                    // स्टेटस के हिसाब से रंग तय करना
                    let statusColor = "orange";
                    let statusText = "पेंडिंग (Pending)";
                    if (userData.status === "approved") {
                        statusColor = "green";
                        statusText = "वेरीफाइड (Verified)";
                    }

                    const row = `<tr>
                        <td><strong>${userData.name}</strong></td>
                        <td>${userData.username}</td>
                        <td style="color: ${statusColor}; font-weight:bold;">${statusText}</td>
                        <td>
                            ${userData.status === 'pending' ? 
                            `<button class="approve-btn" onclick="verifyStudent('${key}')">Verify</button>
                             <button class="reject-btn" onclick="rejectStudent('${key}')">Reject</button>` : 
                            `✅ चालू है | <button class="reject-btn" style="padding:3px 8px; font-size:12px;" onclick="rejectStudent('${key}')">Block</button>`}
                        </td>
                    </tr>`;
                    tbody.innerHTML += row;
                }
            }

            if(!hasRecords) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#999;">अभी कोई नया रजिस्ट्रेशन नहीं हुआ है।</td></tr>`;
            }
        }

        // 1. स्टूडेंट को Approve/Verify करने का फंक्शन
        function verifyStudent(key) {
            const userData = JSON.parse(localStorage.getItem(key));
            userData.status = "approved"; 
            localStorage.setItem(key, JSON.stringify(userData)); 
            alert(userData.name + " का अकाउंट चालू (Verify) कर दिया गया है!");
            loadStudents(); 
        }

        // 2. स्टूडेंट को Reject/Delete करने का फंक्शन
        function rejectStudent(key) {
            const userData = JSON.parse(localStorage.getItem(key));
            // कन्फर्मेशन पूछें ताकि गलती से डिलीट न हो
            if(confirm("क्या आप वाकई " + userData.name + " का रजिस्ट्रेशन रिजेक्ट/डिलीट करना चाहते हैं?")) {
                localStorage.removeItem(key); // मेमोरी से डेटा डिलीट
                alert("अकाउंट रिजेक्ट और डिलीट कर दिया गया है।");
                loadStudents(); // लिस्ट रीफ्रेश करें
            }
        }

        function logout() {
            // सिर्फ लॉगिन टोकन हटाएं, स्टूडेंट्स का डेटा नहीं
            localStorage.removeItem("isLoggedIn");
            localStorage.removeItem("role");
            localStorage.removeItem("currentUser");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
