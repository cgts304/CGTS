<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGTS Portal - Admin Advanced</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; color: #333; padding-bottom: 50px; }
        header { background-color: #2c3e50; color: white; padding: 15px; text-align: center; position: relative;}
        .container { max-width: 950px; margin: 30px auto; padding: 20px; }
        
        /* कोर्स कार्ड स्टाइल */
        .course-card { 
            background: white; padding: 20px; border-radius: 8px; margin-bottom: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 6px solid #3498db; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .course-title { font-size: 18px; font-weight: bold; color: #2c3e50; }
        
        /* 👑 व्यवस्थित एडमिन सेक्शन */
        .admin-section { display: none; background: #fff; padding: 20px; border-radius: 8px; margin-top: 40px; border: 2px solid #e74c3c; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* टैब बटन सिस्टम */
        .tab-menu { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab-btn { background: none; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; color: #666; }
        .tab-btn.active { color: #e74c3c; border-bottom: 3px solid #e74c3c; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; }
        
        /* बटन स्टाइल्स */
        .btn { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .del-btn { background: #b2bec3; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }
        
        /* एडमिन एक्शन बटन्स */
        .action-btn { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; margin-right: 4px; color: white; }
        .btn-activate { background-color: #2ecc71; } /* हरा */
        .btn-activate:hover { background-color: #27ae60; }
        .btn-block { background-color: #e67e22; } /* ऑरेंज */
        .btn-block:hover { background-color: #d35400; }
        .btn-delete { background-color: #e74c3c; } /* लाल */
        .btn-delete:hover { background-color: #c0392b; }
        
        /* रिस्पांसिव टेबल स्टाइल */
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; font-size: 14px; }
        th { background-color: #2c3e50; color: white; position: sticky; top: 0; }
        tr:hover { background-color: #f5f6fa; }
        
        /* स्टेटस बैज */
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .bg-pending { background-color: #ffeaa7; color: #d35400; }
        .bg-active { background-color: #c8f7dc; color: #1ebd60; }
        .bg-blocked { background-color: #fab1a0; color: #e74c3c; }
    </style>
    <script>
        if (localStorage.getItem("isLoggedIn") !== "true") { window.location.href = "login.html"; }
    </script>
</head>
<body>
    <header>
        <h1>CGTS Management Portal</h1>
        <button onclick="localStorage.clear(); window.location.href='login.html';" style="position:absolute; right:15px; top:15px; background:#e74c3c; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; font-weight:bold;">Logout</button>
    </header>

    <div class="container">
        <h2>नमस्ते, <span id="user-display"></span> 👋</h2>
        <p style="color: #666; margin-bottom: 20px;">पढ़ाई शुरू करने के लिए अपने कोर्स पर क्लिक करें:</p>
        
        <div id="course-list"></div>

        <div class="admin-section" id="admin-panel">
            <h3 style="color:#e74c3c; margin-bottom: 15px;">👑 एडमिन एडवांस्ड कंट्रोल सेंटर</h3>
            
            <div class="tab-menu">
                <button class="tab-btn active" onclick="switchTab('course-tab', this)">1. कोर्स मैनेजमेंट</button>
                <button class="tab-btn" onclick="switchTab('student-tab', this)">2. छात्र डेटाबेस एवं अथॉरिटी (<span id="req-count">0</span>)</button>
            </div>

            <div id="course-tab" class="tab-content active">
                <div class="form-group">
                    <label style="font-weight:bold; display:block; margin-bottom:5px;">नया कोर्स / भर्ती परीक्षा जोड़ें:</label>
                    <input type="text" id="course-name" placeholder="उदा. Assistant Teacher Recruitment">
                    <button class="btn" style="margin-top:10px;" onclick="addCourse()">+ कोर्स लाइव करें</button>
                </div>
            </div>

            <div id="student-tab" class="tab-content">
                <p style="color:#666; font-size:14px; margin-bottom: 10px;">पंजीकृत छात्रों की सूची और नियंत्रण कमांड्स:</p>
                
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>छात्र का नाम</th>
                                <th>मोबाइल (यूज़रनेम)</th>
                                <th>पासवर्ड (Password)</th>
                                <th>वर्तमान स्टेटस</th>
                                <th>अथॉरिटी कमांड्स (Actions)</th>
                            </tr>
                        </thead>
                        <tbody id="student-table-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const isAdmin = localStorage.getItem("role") === "admin";
        document.getElementById("user-display").innerText = localStorage.getItem("currentUser");
        
        if(isAdmin) document.getElementById("admin-panel").style.display = "block";

        if(!localStorage.getItem("cgts_data")) {
            localStorage.setItem("cgts_data", JSON.stringify([{ id: "c1", name: "Assistant Teacher Recruitment", subjects: [] }]));
        }
        let globalData = JSON.parse(localStorage.getItem("cgts_data"));

        function renderCourses() {
            const list = document.getElementById("course-list");
            list.innerHTML = "";
            globalData.forEach(course => {
                list.innerHTML += `
                    <div class="course-card" onclick="window.location.href='subjects.html?courseId=${course.id}'">
                        <span class="course-title">📋 ${course.name}</span>
                        ${isAdmin ? `<button class="del-btn" style="background:#e74c3c" onclick="event.stopPropagation(); deleteCourse('${course.id}')">Delete</button>` : '➜'}
                    </div>`;
            });
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
            if(tabId === 'student-tab') loadStudents();
        }

        // 🛡️ एडवांस्ड स्टूडेंट डेटाबेस लोडर
        function loadStudents() {
            const tbody = document.getElementById("student-table-body");
            if(!tbody) return;
            tbody.innerHTML = "";
            let count = 0;

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.indexOf("user_") === 0) {
                    count++;
                    const userData = JSON.parse(localStorage.getItem(key));
                    
                    let statusBadge = "";
                    if (userData.status === "pending") {
                        statusBadge = `<span class="badge bg-pending">Pending</span>`;
                    } else if (userData.status === "approved") {
                        statusBadge = `<span class="badge bg-active">Active</span>`;
                    } else if (userData.status === "blocked") {
                        statusBadge = `<span class="badge bg-blocked">Blocked</span>`;
                    }

                    // डायनेमिक बटन जनरेशन स्टेटस के आधार पर
                    let actionButtons = "";
                    if (userData.status === "pending" || userData.status === "blocked") {
                        actionButtons += `<button class="action-btn btn-activate" onclick="changeStatus('${key}', 'approved')">Activate</button>`;
                    }
                    if (userData.status === "approved") {
                        actionButtons += `<button class="action-btn btn-block" onclick="changeStatus('${key}', 'blocked')">Block</button>`;
                    }
                    actionButtons += `<button class="action-btn btn-delete" onclick="deleteStudent('${key}')">Reject/Delete</button>`;

                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${userData.name}</strong></td>
                            <td style="font-family: monospace; font-size:15px;">${userData.username}</td>
                            <td style="color:#7f8c8d; font-family: monospace;">${userData.password}</td>
                            <td>${statusBadge}</td>
                            <td>${actionButtons}</td>
                        </tr>`;
                }
            }
            document.getElementById("req-count").innerText = count;
            if (count === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999;">डेटाबेस में कोई छात्र पंजीकृत नहीं है।</td></tr>`;
            }
        }

        // स्टेटस बदलने का कंबाइंड फंक्शन (Activate / Block)
        function changeStatus(key, newStatus) {
            const userData = JSON.parse(localStorage.getItem(key));
            userData.status = newStatus;
            localStorage.setItem(key, JSON.stringify(userData));
            
            const msg = newStatus === 'approved' ? 'एक्टिवेट (सक्रिय)' : 'ब्लॉक (प्रतिबंधित)';
            alert(userData.name + " का अकाउंट " + msg + " कर दिया गया है!");
            loadStudents();
        }

        // पूरी तरह डिलीट/रिजेक्ट करने का फंक्शन
        function deleteStudent(key) {
            const userData = JSON.parse(localStorage.getItem(key));
            if(confirm("सावधान! क्या आप सचमुच " + userData.name + " का डेटाबेस रिकॉर्ड हमेशा के लिए डिलीट/रिजेक्ट करना चाहते हैं?")) {
                localStorage.removeItem(key);
                alert("छात्र का रिकॉर्ड डिलीट कर दिया गया है।");
                loadStudents();
            }
        }

        function addCourse() {
            const name = document.getElementById("course-name").value.trim();
            if(!name) return;
            globalData.push({ id: "c_" + Date.now(), name: name, subjects: [] });
            localStorage.setItem("cgts_data", JSON.stringify(globalData));
            document.getElementById("course-name").value = "";
            renderCourses();
        }

        function deleteCourse(id) {
            if(confirm("इस कोर्स को हटा दें?")) {
                globalData = globalData.filter(c => c.id !== id);
                localStorage.setItem("cgts_data", JSON.stringify(globalData));
                renderCourses();
            }
        }

        renderCourses();
        if(isAdmin) loadStudents();
    </script>
</body>
</html>
